# Application Info
spring.application.name=buildsmart-staff-management
server.port=8080

# DATABASE CONFIGURATION

# MySQL Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/buildsmart_staff?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/buildsmart?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Mm@sql20
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Database (Development/Testing) - Uncomment to use
#spring.datasource.url=jdbc:h2:mem:staffdb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA / HIBERNATE CONFIGURATION

# Hibernate DDL auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


# LOGGING CONFIGURATION

# Logging level
logging.level.root=INFO
logging.level.com.buildsmart=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file
logging.file.name=logs/buildsmart-staff.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# SPRING BOOT ACTUATOR

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always


# API DOCUMENTATION (Swagger/OpenAPI)

# Swagger UI path: http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha


# APPLICATION SPECIFIC PROPERTIES

# Staff Management Settings
app.staff.max-bulk-operations=100
app.staff.default-page-size=20
app.audit.retention-days=365

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true


# JACKSON (JSON) CONFIGURATION

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Colombo
spring.jackson.default-property-inclusion=non_null


# ERROR HANDLING

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# JWT Configuration
jwt.secret=buildsmartSecretKeyForJWTTokenGenerationAndValidation2025BuildSmartStaffManagement
jwt.expiration=86400000

# Security
spring.security.user.name=admin
spring.security.user.password=admin123